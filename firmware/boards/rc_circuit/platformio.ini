; Planta RC: pino 3 = sinal/alimentacao PWM (0..100% duty), A0 = leitura de
; tensao no capacitor (0..5V, AREF padrao, sem divisor). N=1, M=1.

; grave o env da sua placa: `pio run -e uno -t upload` ou `-e leonardo`.
; o codigo (main.cpp + lib) e o mesmo -- os pinos A0-A3 e PWM 3,5,6,9 existem
; nas duas placas; so muda a arquitetura do chip (ATmega328P vs ATmega32u4).
[env]
platform = atmelavr
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../../lib

[env:uno]
board = uno

[env:leonardo]
board = leonardo
