; Placa generica para "nova planta definida pelo usuario": ate 4 entradas
; analogicas (estado, em Volts) e ate 4 saidas PWM (entrada, em % duty).
; Grave uma vez; o numero de canais REALMENTE usados (n<=4, m<=4) e definido
; por sessao via wizard (Python), nao exige recompilar/regravar.

; grave o env da sua placa: `pio run -e uno -t upload` ou `-e leonardo`.
[env]
platform = atmelavr
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../../lib

[env:uno]
board = uno

[env:leonardo]
board = leonardo
