; Planta TCLab SISO: Q1 (aquecedor 1) -> T1 (sensor 1). N=1, M=1.
; Mesmo pinout/calibracao do sketch legado tclab_datadriven.ino.ino.

; TCLab roda no Arduino Leonardo (env leonardo, default abaixo). Para Uno use
; `pio run -e uno -t upload`.
[platformio]
default_envs = leonardo

[env]
platform = atmelavr
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../../lib

[env:uno]
board = uno

[env:leonardo]
board = leonardo
