; Planta TCLab MIMO: Q1,Q2 (aquecedores) -> T1,T2 (sensores). N=2, M=2.
; NAO VALIDADO EM HARDWARE -- pinout padrao TCLab (Q1=3,Q2=5,T1=A0,T2=A1),
; mas calibracao/AREF precisam ser conferidos na placa real antes de usar.

; TCLab roda no Arduino Leonardo (env leonardo, default abaixo). Para Uno use
; `pio run -e uno -t upload`.
[platformio]
default_envs = leonardo

[env]
platform = atmelavr
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../../lib

[env:uno]
board = uno

[env:leonardo]
board = leonardo
